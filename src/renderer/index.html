<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <link rel="icon" type="image/png" href="./assets/lobrecs-agent-logo.png" />
    <title>Lobrecs Agent</title>
    <!--
      No-flash theme bootstrap. Runs synchronously before <body> paints so the
      persisted theme is applied before React mounts. ThemeProvider would
      otherwise reapply it one frame late, flashing the Midnight default at
      users who picked Lobrecs Wolf.

      This script lives outside the TS module graph, so it cannot import the
      shared constants from hooks/useTheme.tsx — it must re-state the storage
      key 'lobrecs.theme' and the valid ids 'midnight' / 'lobrecs-wolf'.

      Leaving the body empty is SAFE: ThemeProvider still applies the theme on
      mount, so the only cost of not implementing this is the launch flash.
    -->
    <script>
      (function() {
        try {
          var theme = window.localStorage.getItem('lobrecs.theme');
          if (theme === 'midnight' || theme === 'lobrecs-wolf') {
            document.documentElement.dataset.theme = theme;
          }
        } catch (e) {
          // Ignore storage failures
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
