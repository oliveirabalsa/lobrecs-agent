name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            os: macos-latest
            builder-target: --mac
          - platform: Windows
            os: windows-latest
            builder-target: --win
          - platform: Linux
            os: ubuntu-latest
            builder-target: --linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux build dependencies
        if: matrix.platform == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3 build-essential libfontconfig1 rpm

      - name: Install dependencies
        run: npm ci

      - name: Test
        if: matrix.platform != 'Windows'
        run: npm test

      - name: Build renderer and main
        run: npm run build

      - name: Package and publish Lobrecs Agent (macOS)
        if: matrix.platform == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac --publish always

      - name: Package and publish Lobrecs Agent (Windows / Linux)
        if: matrix.platform != 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder ${{ matrix.builder-target }} --publish always

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lobrecs-agent-${{ matrix.platform }}
          path: dist-electron/**
          if-no-files-found: error
