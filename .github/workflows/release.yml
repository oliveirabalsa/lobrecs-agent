name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            os: macos-latest
            builder-target: --mac
          - platform: Windows
            os: windows-latest
            builder-target: --win
          - platform: Linux
            os: ubuntu-latest
            builder-target: --linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build renderer and main
        run: npm run build

      - name: Package and publish Lobrecs Agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder ${{ matrix.builder-target }} --publish always

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lobrecs-agent-${{ matrix.platform }}
          path: dist-electron/**
          if-no-files-found: error
